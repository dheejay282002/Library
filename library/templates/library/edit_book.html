{% extends 'library/base.html' %}

{% block title %}Edit Book{% endblock %}

{% block content %}
<h1 class="text-xl md:text-2xl font-bold text-gray-800 mb-6">
    <i class="fas fa-edit mr-2 text-blue-600"></i>Edit Book
</h1>

<form method="POST" enctype="multipart/form-data" class="space-y-4 md:space-y-6 bg-white p-6 rounded-lg shadow-lg">
    {% csrf_token %}
    
    <div class="flex flex-col md:flex-row gap-4">
        <!-- ISBN -->
        <div class="flex-1">
            <label for="id_isbn" class="block text-sm font-medium text-gray-700">ISBN</label>
            <input type="text" name="isbn" id="id_isbn" value="{{ form.isbn.value|default_if_none:'' }}"
                   class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base">
        </div>

        <!-- Title -->
        <div class="flex-1">
            <label for="id_title" class="block text-sm font-medium text-gray-700">Title</label>
            <input type="text" name="title" id="id_title" value="{{ form.title.value|default_if_none:'' }}"
                   class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base">
        </div>
    </div>

    <div class="flex flex-col md:flex-row gap-4">
        <!-- Author -->
        <div class="flex-1">
            <label for="id_author" class="block text-sm font-medium text-gray-700">Author</label>
            <input type="text" name="author" id="id_author" value="{{ form.author.value|default_if_none:'' }}"
                   class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base">
        </div>

        <!-- Category -->
        <div class="flex-1">
            <label for="id_category" class="block text-sm font-medium text-gray-700">Category</label>
            <input type="text" name="category" id="id_category" value="{{ form.category.value|default_if_none:'' }}"
                   class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base">
        </div>
    </div>

    <div class="flex flex-col md:flex-row gap-4">
        <!-- Shelf -->
        <div class="flex-1">
            <label for="id_shelf" class="block text-sm font-medium text-gray-700">Shelf</label>
            <input type="text" name="shelf" id="id_shelf" value="{{ form.shelf.value|default_if_none:'' }}"
                   class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base">
        </div>

        <!-- Publisher -->
        <div class="flex-1">
            <label for="id_publisher" class="block text-sm font-medium text-gray-700">Publisher</label>
            <input type="text" name="publisher" id="id_publisher" value="{{ form.publisher.value|default_if_none:'' }}"
                   class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base">
        </div>
    </div>

    <div class="flex flex-col md:flex-row gap-4">
        <!-- Year Published -->
        <div class="flex-1">
            <label for="id_year_published" class="block text-sm font-medium text-gray-700">Year Published</label>
            <input type="number" name="year_published" id="id_year_published" value="{{ form.year_published.value|default_if_none:'' }}"
                   class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base">
        </div>

        <!-- Copies Total -->
        <div class="flex-1">
            <label for="id_copies_total" class="block text-sm font-medium text-gray-700">Total Copies</label>
            <input type="number" name="copies_total" id="id_copies_total" value="{{ form.copies_total.value|default_if_none:'' }}"
                   class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base">
        </div>
    </div>

    <!-- Copies Available -->
    <div class="flex-1">
        <label for="id_copies_available" class="block text-sm font-medium text-gray-700">Available Copies</label>
        <input type="number" name="copies_available" id="id_copies_available" value="{{ form.copies_available.value|default_if_none:'' }}"
               class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base">
    </div>
<!-- Book Cover -->
<div>
    <label for="id_book_cover" class="block text-sm font-medium text-gray-700">Book Cover</label>
    <input type="file" name="book_cover" id="id_book_cover"
           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base bg-white">
    
    {% if form.instance.book_cover %}
        <p class="mt-2 text-sm text-gray-600">Current Cover:</p>
        <img src="{{ form.instance.book_cover.url }}" 
             alt="Book Cover" class="w-24 h-32 object-cover rounded shadow">
    {% endif %}
</div>

    <!-- Description -->
    <div>
        <label for="id_description" class="block text-sm font-medium text-gray-700">Description</label>
        <textarea name="description" id="id_description" rows="3"
                  class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg text-sm md:text-base">{{ form.description.value|default_if_none:'' }}</textarea>
    </div>
<div class="flex justify-end items-center gap-3">

    <!-- Cancel -->
    <a href="{% url 'manage_books' %}"
       class="inline-flex items-center justify-center gap-2
              px-5 h-[40px] rounded-md font-semibold whitespace-nowrap
              bg-gray-300 text-gray-800 hover:bg-gray-400 shadow-sm">
        Cancel
    </a>

    <!-- Save -->
    <button type="submit"
        class="inline-flex items-center justify-center gap-2
               px-5 h-[40px] rounded-md font-semibold whitespace-nowrap
               bg-blue-600 text-white hover:bg-blue-700 shadow-sm">
        Save Changes
    </button>

</div>

</form>
{% endblock %}
