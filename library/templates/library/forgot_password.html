<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">
    <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Forgot Password</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Enter your email" required
               class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-700">
        <button type="submit"
                class="w-full bg-green-700 text-white py-3 rounded-lg hover:bg-green-800 transition font-semibold">
            Send Reset Code
        </button>
    </form>
</div>

</body>
</html>
