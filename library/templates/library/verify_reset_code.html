<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Reset Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-gray-900 mb-4 text-center">Verify Code</h1>
        <p class="text-gray-700 mb-6 text-center">Enter the 6-digit code sent to your email.</p>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <!-- Reset Code Input -->
            <div class="flex flex-col">
                <label for="code" class="text-sm font-medium text-gray-900 mb-2">Reset Code</label>
                <input type="text" name="code" id="code" required
                       class="w-full p-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>

            <!-- Submit Button -->
            <button type="submit"
                    class="w-full mt-4 bg-green-800 text-white py-3 rounded-lg hover:bg-green-900 transition font-semibold">
                Verify Code
            </button>
        </form>

        <!-- Resend Code Link -->
        <div class="mt-4 text-center">
            <a href="{% url 'resend_reset_code' uid=user.pk %}"
               class="text-blue-500 hover:text-blue-700 font-semibold">
               Resend Code
            </a>
        </div>
    </div>

</body>
</html>
