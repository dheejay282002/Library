{% extends 'library/base.html' %}
{% block title %}Browse Books{% endblock %}
{% block content %}
<div class="container mx-auto px-4 py-6">

    <h1 class="text-3xl font-bold mb-6">
        <i class="fas fa-book-reader mr-2 text-green-600"></i>Browse Books
    </h1>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow-lg p-4 mb-6 flex flex-col md:flex-row md:items-center gap-4">
            <!-- Search input -->
            <input id="searchInput" type="text" placeholder="Search by title, author, or ISBN..."
                value="{{ search_query }}"
                class="flex-1 min-w-0 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">

            <!-- Category filter -->
            <select id="categoryFilter"
                class="flex-shrink-0 w-full md:w-48 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <option value="">All Categories</option>
                {% for cat in categories %}
                    <option value="{{ cat }}" {% if selected_category == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>

            <!-- Shelf filter -->
            <select id="shelfFilter"
                class="flex-shrink-0 w-full md:w-48 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <option value="">All Shelves</option>
                {% for shelf in shelves %}
                    <option value="{{ shelf }}" {% if selected_shelf == shelf %}selected{% endif %}>{{ shelf }}</option>
                {% endfor %}
            </select>
        </div>


    <!-- Book Grid -->
    <div id="bookGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-4">
        {% include 'books/_book_grid.html' %}
    </div>

    <!-- Pagination -->
    <div id="paginationWrapper">
        {% include 'books/_pagination.html' %}
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-gray-800 bg-opacity-50 flex items-center justify-center z-50">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const shelfFilter = document.getElementById('shelfFilter');
    const bookGrid = document.getElementById('bookGrid');
    const paginationWrapper = document.getElementById('paginationWrapper');

    let timeout = null;

    function fetchBooks(url = null) {
        const params = new URLSearchParams({
            search: searchInput.value,
            category: categoryFilter.value,
            shelf: shelfFilter.value
        });
        const fetchUrl = url || `${window.location.pathname}?${params.toString()}`;

        fetch(fetchUrl, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(res => res.json())
            .then(data => {
                // Update book grid and pagination instantly
                bookGrid.innerHTML = data.html;
                paginationWrapper.innerHTML = data.pagination;

                // Rebind pagination links
                document.querySelectorAll('#paginationWrapper a').forEach(link => {
                    link.addEventListener('click', e => {
                        e.preventDefault();
                        fetchBooks(link.getAttribute('href'));
                    });
                });
            });
    }

    function debounceFetch() {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            fetchBooks(); // no loading overlay
        }, 300);
    }

    // Live search
    searchInput.addEventListener('input', debounceFetch);

    // Filters
    categoryFilter.addEventListener('change', fetchBooks);
    shelfFilter.addEventListener('change', fetchBooks);

    // Initial bind for pagination links
    document.querySelectorAll('#paginationWrapper a').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            fetchBooks(link.getAttribute('href'));
        });
    });
});
document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const shelfFilter = document.getElementById('shelfFilter');
    const bookGrid = document.getElementById('bookGrid');
    const paginationWrapper = document.getElementById('paginationWrapper');

    function fetchBooks(paramsObj = {}) {
        const params = new URLSearchParams(paramsObj);
        const fetchUrl = `${window.location.pathname}?${params.toString()}`;

        fetch(fetchUrl, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(res => res.json())
            .then(data => {
                bookGrid.innerHTML = data.html;
                paginationWrapper.innerHTML = data.pagination;

                // Rebind pagination links
                document.querySelectorAll('#paginationWrapper a').forEach(link => {
                    link.addEventListener('click', e => {
                        e.preventDefault();
                        fetchBooks(Object.fromEntries(new URL(link.href).searchParams));
                    });
                });
            });
    }

    // Live search
    let timeout = null;
    searchInput.addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            fetchBooks({ 
                search: searchInput.value,
                category: categoryFilter.value,
                shelf: shelfFilter.value
            });
        }, 200);
    });

    // Category or shelf change
    function filterBooks() {
        fetchBooks({ 
            search: searchInput.value,
            category: categoryFilter.value,
            shelf: shelfFilter.value
        });
    }

    categoryFilter.addEventListener('change', filterBooks);
    shelfFilter.addEventListener('change', filterBooks);
});


</script>

{% endblock %}
