{% for book in books %}
<tr>
    <td class="px-6 py-4">
        {% if book.book_cover %}
            <img src="{{ book.book_cover.url }}" alt="{{ book.title }}" class="w-12 h-16 object-cover rounded shadow-sm">
        {% else %}
            <div class="w-12 h-16 bg-gradient-to-br from-blue-400 to-blue-600 rounded flex items-center justify-center shadow-sm">
                <i class="fas fa-book text-white text-xl"></i>
            </div>
        {% endif %}
    </td>

    <td class="px-6 py-4 text-sm font-mono">{{ book.isbn }}</td>
    <td class="px-6 py-4 text-sm font-semibold">{{ book.title }}</td>
    <td class="px-6 py-4 text-sm">{{ book.author }}</td>

    <!-- ✅ THIS WAS MISSING -->
    <td class="px-6 py-4 text-sm">{{ book.shelf }}</td>

    <td class="px-6 py-4 text-sm">{{ book.category }}</td>
    <td class="px-6 py-4 text-sm">{{ book.copies_available }}/{{ book.copies_total }}</td>

    <td class="px-6 py-4 text-sm flex gap-3 whitespace-nowrap">
        <a href="{% url 'edit_book' book.id %}" class="text-green-900 hover:text-green-800">
            <i class="fas fa-edit"></i>
        </a>
        <a href="{% url 'delete_book' book.id %}" class="text-red-600 hover:text-red-800">
            <i class="fas fa-trash"></i>
        </a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="8" class="px-6 py-4 text-center text-gray-500">No books found</td>
</tr>
{% endfor %}
