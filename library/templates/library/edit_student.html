{% extends 'library/base.html' %}

{% block title %}Edit Student{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6"><i class="fas fa-edit mr-2 text-blue-600"></i>Edit Student</h1>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-600 text-sm mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        
<div class="flex justify-end items-center space-x-3 pt-4 border-t">
    <a href="{% url 'manage_students' %}" 
       class="px-6 py-2 bg-gray-300 hover:bg-gray-400 text-gray-800 rounded-lg font-semibold transition">
        Cancel
    </a>
    <button type="submit" 
            class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition">
        <i class="fas fa-save mr-2"></i>Update Student
    </button>
</div>

    </form>
</div>
{% endblock %}
