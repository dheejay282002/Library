{% extends 'library/base.html' %}
{% block title %}Chat with Librarian{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg p-6 flex flex-col h-[80vh]">
    <h1 class="text-xl font-bold mb-4">Chat with Librarian</h1>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto mb-4 space-y-2">
        {% for msg in messages %}
            <div class="flex {% if msg.sender == user %}justify-end{% else %}justify-start{% endif %}">
                <div class="p-2 rounded-lg max-w-xs {% if msg.sender == user %}bg-blue-600 text-white{% else %}bg-gray-200 text-gray-800{% endif %}">
                    <p>{{ msg.content }}</p>
                    <span class="text-xs text-gray-500">{{ msg.timestamp|date:"H:i" }}</span>
                </div>
            </div>
        {% empty %}
            <p class="text-center text-gray-500">No messages yet.</p>
        {% endfor %}
    </div>

    <!-- Message input -->
    <form method="post" class="flex space-x-2">
        {% csrf_token %}
        <input type="text" name="content" placeholder="Type a message..." required
               class="flex-1 border rounded-lg px-3 py-2 focus:outline-none">
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Send</button>
    </form>
</div>

<script>
    const messagesDiv = document.getElementById('messages');
    messagesDiv.scrollTop = messagesDiv.scrollHeight; // auto scroll to bottom
</script>
{% endblock %}
